name: Release

# Builds portable bundles for Windows, Linux and macOS (plus the Windows
# installer) and publishes them to a GitHub pre-release. Triggered by pushing
# a version tag (v*), or manually for an existing tag via workflow_dispatch.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag to build and attach (e.g. v1.0.0-pre-alpha.1)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux system dependencies (Qt)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            libxkbcommon-x11-0 libxcb-xkb1 libxcb-cursor0 libegl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller --noconfirm packaging/nestube.spec

      - name: Package portable zip + installer (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\NesTube\NesTube.exe")) { throw "PyInstaller output missing" }
          $ver = python -c "from nestube import __version__; print(__version__)"
          Compress-Archive -Path "dist\NesTube" -DestinationPath "NesTube-$ver-windows.zip" -Force

          choco install innosetup -y --no-progress
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "$env:ProgramFiles\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found after Inno Setup install" }
          & $iscc "/DMyAppVersion=$ver" "packaging\nestube.iss"

          Get-ChildItem "NesTube-*-windows.zip", "NesTube-*-setup.exe" | Format-Table Name, Length

      - name: Package portable zip (Linux)
        if: matrix.platform == 'linux'
        run: |
          test -x dist/NesTube/NesTube
          VER=$(python -c "from nestube import __version__; print(__version__)")
          (cd dist && zip -ry "../NesTube-${VER}-linux.zip" NesTube)
          ls -la NesTube-*-linux.zip

      - name: Package portable zip (macOS)
        if: matrix.platform == 'macos'
        run: |
          test -x dist/NesTube/NesTube
          VER=$(python -c "from nestube import __version__; print(__version__)")
          (cd dist && zip -ry "../NesTube-${VER}-macos.zip" NesTube)
          ls -la NesTube-*-macos.zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nestube-${{ matrix.platform }}
          path: |
            NesTube-*-windows.zip
            NesTube-*-linux.zip
            NesTube-*-macos.zip
            NesTube-*-setup.exe
          if-no-files-found: ignore

  release:
    name: Publish pre-release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List collected assets
        run: ls -la artifacts

      - name: Publish GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: "NesTube ${{ github.event.inputs.release_tag || github.ref_name }}"
          body_path: RELEASE_NOTES.md
          files: artifacts/*
          prerelease: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
