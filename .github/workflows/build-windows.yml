name: Build Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to attach assets (e.g. v1.0.0-alpha.1)"
        required: false
        default: "v2.0.0-alpha.1"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Install Inno Setup 6
        run: choco install innosetup -y --no-progress

      - name: Build NesTube and installer
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm packaging/nestube.spec
          if (-not (Test-Path "dist\NesTube\NesTube.exe")) { throw "PyInstaller output missing" }
          $ver = python -c "from nestube import __version__; print(__version__)"
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "$env:ProgramFiles\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found after Inno Setup install" }
          & $iscc "/DMyAppVersion=$ver" "packaging\nestube.iss"
          $zip = "NesTube-$ver-windows.zip"
          Compress-Archive -Path "dist\NesTube" -DestinationPath $zip -Force
          Get-ChildItem "NesTube-*-setup.exe", "NesTube-*-windows.zip" | Format-Table Name, Length

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nestube-windows
          path: |
            NesTube-*-windows.zip
            NesTube-*-setup.exe

      - name: Attach to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          name: "NesTube ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"
          body_path: RELEASE_NOTES.md
          files: |
            NesTube-*-windows.zip
            NesTube-*-setup.exe
          prerelease: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
