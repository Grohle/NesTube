name: Build Linux portable

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to attach assets (e.g. v2.0.0-alpha.1)"
        required: true
      product_line:
        description: "qt = PySide6 on main | legacy = CustomTkinter 1.x"
        required: true
        default: "qt"
        type: choice
        options:
          - qt
          - legacy

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.product_line == 'legacy' && 'legacy/v1.0-ctk' || inputs.release_tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Qt)
        if: inputs.product_line == 'qt'
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            libxkbcommon-x11-0 libxcb-xkb1 libxcb-cursor0 libegl1

      - name: Install system dependencies (Legacy CTk)
        if: inputs.product_line == 'legacy'
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq python3-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --noconfirm packaging/nestify.spec
          test -f dist/Nestify/Nestify || test -x dist/Nestify/Nestify

      - name: Create tar.gz
        run: |
          VER=$(python -c "from nestify import __version__; print(__version__)")
          ARCHIVE="Nestify-${VER}-linux.tar.gz"
          tar -czf "$ARCHIVE" -C dist Nestify
          ls -la "$ARCHIVE"

      - name: Attach to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: "Nestify ${{ inputs.release_tag }}"
          body_path: RELEASE_NOTES.md
          files: Nestify-*-linux.tar.gz
          prerelease: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
